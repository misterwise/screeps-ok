name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out screeps-ok
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm

      - name: Restore node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-lint-${{ runner.os }}-${{ runner.arch }}-node24.14.1-${{ hashFiles('package-lock.json', 'scripts/build-xxscreeps.js') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Typecheck
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - xxscreeps
          - vanilla
        shard: [1, 2, 3, 4]

    steps:
      - name: Check out screeps-ok
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm

      - name: Restore node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ matrix.adapter }}-full-${{ runner.os }}-${{ runner.arch }}-node24.14.1-${{ hashFiles('package-lock.json', 'scripts/build-xxscreeps.js', 'scripts/setup.js') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        env:
          SCREEPS_OK_SKIP_XXSCREEPS_POSTINSTALL: ${{ matrix.adapter == 'vanilla' && '1' || '' }}
        run: npm ci

      - name: Build adapter prerequisites
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm run setup:${{ matrix.adapter }}

      - name: Run ${{ matrix.adapter }} suite (shard ${{ matrix.shard }}/4)
        run: npm test ${{ matrix.adapter }} -- --shard=${{ matrix.shard }}/4

      - name: Upload ${{ matrix.adapter }}-${{ matrix.shard }} report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.adapter }}-${{ matrix.shard }}
          path: reports/${{ matrix.adapter }}.json
          if-no-files-found: ignore

  summarize:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check out screeps-ok
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1

      - name: Download shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: reports-*
          path: downloaded

      - name: Merge shards and write summary
        run: node scripts/ci-merge-reports.js --artifacts-dir=downloaded

      - name: Upload merged per-adapter reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-merged
          path: reports/
          if-no-files-found: ignore
